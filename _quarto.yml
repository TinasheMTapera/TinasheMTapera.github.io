project:
  type: website
  render:
  - "*.qmd"
  - "!rv/"

execute:
  freeze: auto
  
website:
  title: "Tinashe Michael Tapera"
  site-url: "tinashemtapera.com"
  description: "Tinashe M. Tapera's official website"
  favicon: "assets/img/data-science.png"
  # preview:
  #   timeout: 3600
  
  # navs
  page-navigation: true
  navbar:
    left:
      - text: About
        href: about.qmd
      #- text: News
      #  href: news.qmd
      - text: CV
        href: cv.qmd
      - text: Blog
        href: blog.qmd
    right:
      - icon: github
        href: https://github.com/TinasheMTapera
      - icon: twitter
        href: https://twitter.com/TaperaTinashe
      - icon: linkedin
        href: https://linkedin.com/in/tinashemtapera
  
   #     href: 
   #   - icon: twitter
   #     href: 
  search:
    location: navbar
    type: overlay
    copy-button: true
  #footer
  page-footer:
    center:
      - text: "About"
        href: about.qmd
      - text: "LICENSE"
        href: LICENSE
      - text: "View source on Github"
        href: https://github.com/TinasheMTapera/TinasheMTapera.github.io
      - text: "Buy me a Coffee"
        href: https://www.buymeacoffee.com/tinashemtapera
  #socials
  open-graph: true
  twitter-card: 
    site: "@TaperaTinashe"

format:
  html:
    theme:
      - darkly
      - styles/phantom-inspired.scss
    toc: true
    smooth-scroll: true
