project:
  type: website
  render:
  - "*.qmd"
  - "!rv/"

execute:
  freeze: auto
  
website:
  title: "Tinashe Tapera"
  site-url: "https://tinashemtapera.com"
  description: "Research software engineer building reproducible, notebook-driven workflows for scientific teams."
  favicon: "assets/img/data-science.png"
  # preview:
  #   timeout: 3600
  
  # navs
  page-navigation: true
  navbar:
    left:
      - text: About
        href: about.qmd
      - text: CV
        href: cv.qmd
      - text: Blog
        href: blog.qmd
    right:
      - icon: github
        href: https://github.com/TinasheMTapera
      - icon: bluesky
        href: https://bsky.app/profile/tinashemtapera.bsky.social
      - icon: linkedin
        href: https://linkedin.com/in/tinashemtapera
  
   #     href: 
   #   - icon: twitter
   #     href: 
  search:
    location: navbar
    type: overlay
    copy-button: true
  #footer
  page-footer:
    left: "Research software engineering for reproducible science."
    right:
      - text: "CV"
        href: cv.qmd
      - text: "LinkedIn"
        href: https://linkedin.com/in/tinashemtapera
      - text: "Source"
        href: https://github.com/TinasheMTapera/TinasheMTapera.github.io
      - text: "LICENSE"
        href: LICENSE
      
    center: 
      - text: "© 2026 Tinashe M. Tapera\n\n<img src='assets/img/50F53BB4-147E-488D-8AC7-9BC379BD211D.PNG' alt='Logo' style='height: 150px;' />"
        href: about.qmd
  #socials
  open-graph: true

format:
  html:
    theme:
      - flatly
      - styles/phantom-inspired.scss
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    toc: true
    smooth-scroll: true
